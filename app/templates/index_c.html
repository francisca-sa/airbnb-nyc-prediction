    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to right, #FF99CC, #FF99CC);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .container {
            background-color: #fff;
            max-width: 600px;
            width: 100%;
            padding: 30px;
            margin-top: 60px;
            border-radius: 12px;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.15);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 6px;
            color: #333;
        }

        input, select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            border-color: #FF1493;
            outline: none;
            box-shadow: 0 0 4px #FF66B2;
        }

        button {
            width: 100%;
            background-color: #FF1493;
            color: white;
            padding: 12px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }

        button:hover {
            background-color: #FF66B2;
            transform: scale(1.03);
        }

        #resultado {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            background-color: #FFE6F8;
            color: #571549;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            border-left: 5px solid #A72883;
        }

        .mensagem-erro {
            color: #dc3545;
            font-weight: bold;
            text-align: center;
            margin-top: 10px;
        }

        .icon-label {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .icon-label i {
            color: #FF1493;
        }

    </style>
</head>
