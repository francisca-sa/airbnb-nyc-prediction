<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <title>Perfil Airbnb NYC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to right, #AA6FF5, #AA6FF5);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .container {
            background-color: #fff;
            max-width: 600px;
            width: 100%;
            padding: 30px;
            margin-top: 60px;
            border-radius: 12px;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.15);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 6px;
            color: #333;
        }

        input, select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            border-color: #8A2BE2;
            outline: none;
            box-shadow: 0 0 4px #4B0082;
        }

        button {
            width: 100%;
            background-color: #8A2BE2;
            color: white;
            padding: 12px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }

        button:hover {
            background-color: #4B0082;
            transform: scale(1.03);
        }

        #resultado {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            background-color: #F2E6FF;
            color: #351557;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            border-left: 5px solid #5728A7;
        }

        .mensagem-erro {
            color: #dc3545;
            font-weight: bold;
            text-align: center;
            margin-top: 10px;
        }

        .icon-label {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .icon-label i {
            color: #8A2BE2;
        }

    </style>
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-house"></i> Airbnb NYC Profile </h1>

        <form action="/" method="post">
            <div class="form-group">
                <label class="icon-label"><i class="fas fa-dollar-sign"></i> Price</label>
                <input type="number" name="preco" step="0.01" min="0" required>
            </div>

            <div class="form-group">
                <label class="icon-label"><i class="fas fa-moon"></i> Minimum of Nights</label>
                <input type="number" name="noites" min="1" required>
            </div>

            <button type="submit"><i class="fas fa-house-user"></i> Determine Profile</button>
        </form>

        {% if resultado %}
        <div id="resultado">Airbnb Profile: {{ resultado }}</div>
        {% endif %}

        {% if erro %}
        <div class="mensagem-erro">{{ erro }}</div>
        {% endif %}
    </div>
</body>
</html>
